<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VNY | DSSV PHÒNG THI</title>
    <script src="data.js"></script> 
    <style>
        /* (Giữ nguyên các style cũ của bạn) */
        body { font-family: Arial, sans-serif; margin: 20px; background-color: #ffffff; color: #000000; }
        .header { border-bottom: 1px solid #000000; padding-bottom: 10px; margin-bottom: 10px; }
        .header h1 { margin: 0; font-size: 22px; }
        table { width: 100%; border: 1px solid #000000; border-collapse: collapse; margin-top: 10px; }
        th, td { padding: 8px; border: 1px solid #000000; text-align: left; font-size: 14px; }
        th { background-color: #f2f2f2; }
        button { padding: 4px 10px; cursor: pointer; }
        .btn-back { margin-top: 10px; }
        #searchInput { width: 100%; padding: 8px; margin-bottom: 10px; box-sizing: border-box; border: 1px solid #000; }
        .page { display: none; }
        .active-page { display: block; }
        .loading { padding: 20px; font-style: italic; }
        .error-box { color: red; font-weight: bold; margin: 15px 0; }
        .room-tag { color: #bd1c1c; font-weight: bold; }
        .pagination { margin-top: 15px; text-align: right; }
    </style>
</head>
<body>

    <div class="header">
        <h1 id="pageTitle">VNY | DSSV PHÒNG THI</h1>
        <button id="backBtn" class="btn-back" style="display: none;" onclick="showMainPage()">Quay lại danh sách</button>
    </div>

    <div id="mainPage" class="page active-page">
        <input type="text" id="searchInput" onkeyup="searchSubjects()" placeholder="Tìm kiếm theo tên môn học...">
        <table id="subjectsTable">
            <thead>
                <tr>
                    <th>STT</th>
                    <th>Tên Môn Học</th>
                    <th>Phòng Thi</th>
                    <th style="text-align: center;">DSSV</th>
                </tr>
            </thead>
            <tbody id="subjectsBody"></tbody>
        </table>
        <div class="pagination">
            <span id="pageInfo"></span>
            <button onclick="prevPage()">Trang trước</button>
            <button onclick="nextPage()">Trang sau</button>
        </div>
    </div>

    <div id="detailPage" class="page">
        <div id="statusArea"></div>
        <table id="studentsTable" style="display: none;">
            <thead>
                <tr>
                    <th>STT</th>
                    <th>Số thẻ SV</th>
                    <th>Họ và Tên</th>
                    <th>Ngày Sinh</th>
                    <th>Lớp Sinh Hoạt</th>
                </tr>
            </thead>
            <tbody id="studentsBody"></tbody>
        </table>
    </div>

<script>
    // Dữ liệu bây giờ đã nằm ở file data.js rồi, không cần khai báo ở đây nữa
    let examData = [];
    let filteredData = [];
    let currentPage = 1;
    const rowsPerPage = 20;

    function init() {
        // rawData được lấy từ file data.js
        rawData.trim().split('\n').forEach(line => {
            const parts = line.split('|');
            if (parts.length === 3) {
                examData.push({ stt: parts[0].trim(), name: parts[1].trim(), ca: parts[2].trim(), phong: null });
            }
        });
        filteredData = [...examData];
        renderTable();
    }
    
    // ... (Giữ nguyên các hàm: renderTable, searchSubjects, autoCheckRoom, loadStudents, các hàm phân trang)
    // Tôi để trống phần dưới để bạn copy phần script của bạn vào cho liền mạch nhé.
    init();
</script>
</body>
</html>
